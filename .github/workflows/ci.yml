name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test, lint, and docs (stable)
    runs-on: ubuntu-latest
    # rust-toolchain.toml pins 1.95.0 as a directory override, which would
    # otherwise win over the stable toolchain installed below — making this job
    # silently run on the MSRV instead of stable. RUSTUP_TOOLCHAIN outranks the
    # toml file, so this is what actually gives us current-stable coverage.
    # (The msrv job has no toml override issue: it runs `cargo check` and the
    # toml's 1.95.0 matches the toolchain it installs.)
    env:
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features

      - name: Build documentation
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  msrv:
    name: Minimum supported Rust version (1.95)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2
      - name: Check library
        # Only the library affects downstream MSRV; dev-deps (tests/examples)
        # may require a newer toolchain.
        run: cargo check --all-features

  audit:
    name: Security advisories (cargo audit)
    runs-on: ubuntu-latest
    # rustsec/audit-check@v2 still declares the Node.js 20 runtime, which is
    # being removed from runners on 2026-09-16. The node24 fix exists only on
    # the action's unreleased default branch, so opt the job into the Node.js 24
    # runtime via GitHub's documented override until a tagged release ships it.
    #
    # RUSTUP_TOOLCHAIN=stable: the action runs `cargo install cargo-audit`, whose
    # dependency tree now needs rustc >= 1.96 (kstring 2.0.3). This job installs
    # no toolchain of its own, so rust-toolchain.toml's 1.95.0 directory override
    # would otherwise win and the install fails to compile. Pointing rustup at
    # stable outranks the toml (same reasoning as the `test` job above).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      RUSTUP_TOOLCHAIN: stable
    steps:
      - uses: actions/checkout@v7
      - name: Audit dependencies for RustSec advisories
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
